version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    rust: "1.85"
  jobs:
    install:
      - python -m pip install --upgrade pip
      - python -m pip install ".[docs]"
      - curl -L -o /tmp/quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.32/quarto-1.7.32-linux-amd64.tar.gz
      - mkdir -p /tmp/quarto
      - tar -xzf /tmp/quarto.tar.gz -C /tmp/quarto --strip-components=1
    build:
      html:
        - cd docs/quarto && python -m quartodoc build
        - cd docs/quarto && python _scripts/render_runtime_docstrings.py
        - cd docs/quarto && MPLBACKEND="module://matplotlib_inline.backend_inline" QUARTO_PYTHON="$(python -c 'import sys; print(sys.executable)')" /tmp/quarto/bin/quarto render
        - mkdir -p "$READTHEDOCS_OUTPUT/html"
        - cp -r docs/quarto/_site/* "$READTHEDOCS_OUTPUT/html/"
